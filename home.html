<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Github Issue Tracker | Home</title>

    <!-- DaisiUI and Tailwind Cdn -->
    <link href="https://cdn.jsdelivr.net/npm/daisyui@5" rel="stylesheet" type="text/css" />
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>

    <!-- Font Awesome Cdn -->
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css"
      integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw=="
      crossorigin="anonymous"
      referrerpolicy="no-referrer"
    />

    <!-- Text font -->
    <link href="https://fonts.googleapis.com/css?family=Geist:100,200,300,regular,500,600,700,800,900" rel="stylesheet" />

    <!-- Stylesheet -->
    <link rel="stylesheet" href="./style/style.css" />

    <!-- Favicon Link -->
    <link rel="shortcut icon" href="./assets/github-logo.png" type="image/x-icon" />
  </head>

  <body class="">
    <header>
      <section class="navbar">
        <div class="navbar shadow-sm flex flex-col md:flex-row items-center justify-between gap-3">
          <div class="flex gap-1 items-center justify-center md:justify-start">
            <div class="image-div w-[50px]">
              <img src="./assets/github-logo.png" alt="" srcset="" />
            </div>
            <h3 class="text-[24px] font-bold text-[#1F2937]">GitHub Issues Tracker</h3>
          </div>
          <div class="flex gap-2 items-center justify-center">
            <div class="relative">
              <i class="fa-solid fa-magnifying-glass absolute left-3 top-1/2 z-10 -translate-y-1/2 text-gray-400"></i>

              <input id="search-input" type="text" placeholder="Search Issues..." class="input input-bordered w-24 md:w-auto pl-10 text-[#64748B] font-semibold" />
            </div>
            <button id="next-issue-btn" class="btn btn-primary">
              <i class="fa-solid fa-plus"></i>
              New Issue
            </button>
          </div>
        </div>
      </section>
    </header>
    <main>
      <!-- Btn Section -->
      <section class="btn-section w-[85%] shadow-md mx-auto p-[24px] mt-[60px]">
        <div class="">
          <button onclick="toggleStyle('all-filter-btn')" id="all-filter-btn" class="btn bg-[#4A00FF] text-white md:w-[100px]">All</button>
          <button onclick="toggleStyle('open-filter-btn')" id="open-filter-btn" class="btn text-[#64748B] md:w-[100px]">Open</button>
          <button onclick="toggleStyle('close-filter-btn')" id="close-filter-btn" class="btn text-[#64748B] md:w-[100px]">Closed</button>
        </div>
      </section>

      <!-- Issues Section -->
      <section class="issues-section w-[85%] mx-auto mt-4">
        <div class="p-6 shadow-lg flex justify-between items-center">
          <div class="flex gap-1 items-center">
            <img src="./assets/Aperture.png" alt="" srcset="" />
            <div>
              <p class="font-semibold text-[#1F2937]">
                <span id="total-issues">0</span>
                Issues
              </p>
              <p class="text-[#64748B]">Track and manage your project issues</p>
            </div>
          </div>
          <div class="flex gap-3 items-center">
            <div class="flex items-center gap-1">
              <div class="w-3 h-3 rounded-full bg-[#00A96E]"></div>
              <span class="text-[16px] leading-none font-medium m-0">Open</span>
            </div>
            <div class="flex items-center gap-1">
              <div class="w-3 h-3 rounded-full bg-[#A855F7]"></div>
              <span class="text-[16px] leading-none font-medium">Closed</span>
            </div>
          </div>
        </div>
        <section class="all-issue mt-3 p-6">
          <div class="" id="all-card-container">
            <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-4 gap-[12px]" id="card-info">
              <div id="loading-spinner" class="col-span-4 py-10 hidden">
                <div class="flex justify-center">
                  <span class="loading loading-spinner loading-lg text-primary"></span>
                </div>
              </div>
            </div>
          </div>
        </section>
      </section>

      <!-- Modal Section -->
      <dialog id="my_modal_1" class="modal">
        <div class="modal-box">
          <div id="box-container"></div>
          <div class="modal-action">
            <form method="dialog">
              <button class="btn btn-primary">Close</button>
            </form>
          </div>
        </div>
      </dialog>
    </main>
    <script src="./script/home.js"></script>
  </body>
</html>
